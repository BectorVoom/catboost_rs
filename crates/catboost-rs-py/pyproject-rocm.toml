# ROCm distribution config for the two-distribution model (D-08 / D-09).
#
# This is the `catboost-rs-rocm` PyPI distribution: a SEPARATE distribution from
# the cpu `catboost-rs` (pyproject.toml), because PyPI accepts only one binary
# wheel per name+version+platform and the cpu/rocm `.so`s are different artifacts.
# The import name stays `catboost_rs` (D-09) — both distributions install the same
# module; they are MUTUALLY EXCLUSIVE (see PACKAGING.md, Pitfall 4).
#
# Build IN-ENV ONLY (gfx1100 / ROCm 7.1) — NEVER in GitHub Actions (D-06, carried
# from Phase 7). The rocm arm links cubecl-hip-sys and needs the HIP toolchain.
#
# Build command (cpu-free per the 08-01 feature wiring):
#   cd crates/catboost-rs-py
#   maturin build --no-default-features --features rocm --release
#
# To build the rocm distribution under its own name, use the build wrapper
# `build-rocm-wheel.sh` (IN-04): it swaps this file in for pyproject.toml
# transactionally and ALWAYS restores the original on exit, so a half-applied
# `cp pyproject-rocm.toml pyproject.toml` swap can never persist in the checkout and
# mis-name the wheel. Run:
#   crates/catboost-rs-py/build-rocm-wheel.sh
# The Cargo manifest is shared (crates/catboost-rs-py/Cargo.toml); only the
# [project].name and the absence of the [rocm] extra differ from the cpu pyproject.
#
# Build-host note (08-08): maturin's wheel-repair step bundles the HIP shared libs
# via `patchelf` — install it first (`pip install patchelf` into the build venv) or
# the build fails at "Failed to execute 'patchelf'".
#
# RUNTIME note (08-08, validated in-env on gfx1100 / ROCm 7.1.1): the cubecl-hip
# JIT (`libhiprtc`) resolves its companion comgr/LLVM bitcode via the ROCm install
# path at kernel-compile time. The wheel-bundled `libhiprtc` is patchelf-renamed and
# loses that resolution, so a GPU `fit()` JIT-compiling a `#[cube]` der kernel
# segfaults inside `HipContext::compile_kernel` (a null JIT-log strlen). Run the
# rocm wheel against the SYSTEM ROCm libs so the JIT finds its data files:
#
#   ROCM_PATH=/opt/rocm HIP_PATH=/opt/rocm \
#   LD_PRELOAD=/opt/rocm/lib/libhiprtc.so.7:/opt/rocm/lib/libamdhip64.so.7 \
#   python -c "import catboost_rs; ..."
#
# This is a wheel-runtime environment requirement (the rocm wheel is an in-env
# artifact, D-06), NOT a code defect: the same kernels JIT cleanly under
# `cargo test --features rocm`. Bundling the comgr bitcode tree into the wheel (so
# the LD_PRELOAD is unnecessary) is a forward packaging task.

[build-system]
requires = ["maturin>=1.9.4,<2.0"]
build-backend = "maturin"

[project]
# Separate distribution name (D-08). `catboost-rs[rocm]` (cpu pyproject) depends
# on THIS distribution.
name = "catboost-rs-rocm"
version = "0.1.0"
description = "Rust-native CatBoost (ROCm/HIP backend) — scikit-learn-compatible and CatBoost-native Python bindings"
requires-python = ">=3.12"
readme = "README.md"
license = { text = "Apache-2.0" }
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Environment :: GPU",
]

# No [rocm] extra here: this IS the rocm distribution. Installing it alongside the
# cpu `catboost-rs` is forbidden (both expose `catboost_rs`; see PACKAGING.md).

[tool.maturin]
# Same import name as the cpu distribution (D-09).
module-name = "catboost_rs"
# extension-module is wheel-only (same rationale as the cpu pyproject). The rocm
# backend is selected via the Cargo `rocm` feature on the maturin command line
# (`--no-default-features --features rocm`), NOT here, so the build stays cpu-free.
features = ["pyo3/extension-module"]
